<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bounty Board</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.cover {
    position: relative;
    width: 100%;
    height: 100vh;
}

.cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);

    display: flex;
    justify-content: center;
    align-items: center;
}

.enter-btn {
    padding: 15px 40px;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    background: #0078ff;
    color: white;
    cursor: pointer;
}

.enter-btn:hover {
    opacity: 0.9;
}
</style>
</head>
<body>

<div class="cover">
    <img src="Logo/Cover.jpg" alt="Cover">

    <div class="overlay">
        <button
            class="enter-btn"
            onclick="window.location.href='board.html'">
            Enter Bounty Board
        </button>
    </div>
</div>

</body>
</html>
