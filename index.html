<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bounty Board</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    text-align: center;
    padding: 30px 20px;
    border-bottom: 1px solid #333;
}

.logo {
    max-width: 300px;
    width: 100%;
    height: auto;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 25px;
}

button {
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #0078ff;
    color: white;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 25px;
    padding: 25px;
}

.bounty-card {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
}

.bounty-card img {
    width: 100%;
    display: block;
}

.bounty-title {
    padding: 15px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
}
</style>
</head>
<body>

<header>
    <!-- CHANGE THIS IF YOUR LOGO HAS A DIFFERENT NAME -->
    <img src="Logo/Logo.jpg" alt="Logo" class="logo">
</header>

<div class="controls">
    <button onclick="showBounties('general')">General Bounties</button>
    <button onclick="showBounties('custom')">Custom Bounties</button>
</div>

<div id="gallery" class="gallery"></div>

<script>

// ==========================
// GENERAL BOUNTIES
// ==========================

const generalBounties = [
    {
        title: "Elliott",
        image: "Bounties/General/Elliott.png"
    },
    {
        title: "Knott",
        image: "Bounties/General/Knott.png"
    },
    {
        title: "Ethan",
        image: "Bounties/General/Ollie.png"
    }
];

// ==========================
// CUSTOM BOUNTIES
// ==========================

const customBounties = [
    {
        title: "Piotr",
        image: "Bounties/Custom/Piotr.png"
    }
];

function showBounties(type) {

    const gallery = document.getElementById("gallery");

    const bountyList =
        type === "general"
        ? generalBounties
        : customBounties;

    gallery.innerHTML = bountyList.map(bounty => `
        <div class="bounty-card">
            <img src="${bounty.image}" alt="${bounty.title}">
            <div class="bounty-title">${bounty.title}</div>
        </div>
    `).join("");
}

// Show General by default
showBounties("general");

</script>

</body>
</html>
