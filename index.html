```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bounty Board</title>

<!-- Markdown Renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    text-align: center;
    padding: 30px 20px;
    border-bottom: 1px solid #333;
}

.logo {
    max-width: 300px;
    width: 100%;
    height: auto;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 25px;
}

button {
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #0078ff;
    color: white;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

.set-description {
    max-width: 1100px;
    margin: 0 auto 25px auto;
    padding: 20px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 12px;
    line-height: 1.6;
}

.set-description h1,
.set-description h2,
.set-description h3 {
    margin-top: 0;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 25px;
    padding: 25px;
}

.bounty-card {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
}

.bounty-card img {
    width: 100%;
    display: block;
}

.bounty-title {
    padding: 15px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
}

</style>
</head>
<body>

<header>
    <img src="Logo/Logo.jpg" alt="Logo" class="logo">
</header>

<div class="controls">
    <button onclick="showBounties('general')">
        General Bounties
    </button>

    <button onclick="showBounties('custom')">
        Custom Bounties
    </button>
</div>

<div id="set-description" class="set-description">
    Loading...
</div>

<div id="gallery" class="gallery"></div>

<script>

// ==========================
// GENERAL BOUNTIES
// ==========================

const generalBounties = [
    {
        title: "Elliott",
        image: "Bounties/General/Elliott.png"
    },
    {
        title: "Knott",
        image: "Bounties/General/Knott.png"
    },
    {
        title: "Ethan",
        image: "Bounties/General/Ethan.png"
    },
    {
        title: "Ollie"
        image: "Bounties/General/Ollie.png"
    }
];

// ==========================
// CUSTOM BOUNTIES
// ==========================

const customBounties = [
    {
        title: "Piotr",
        image: "Bounties/Custom/Piotr.png"
    },
    {
        title: "Angus"
        image: "Bounties/Custom/Angus.png"
    }
];

// ==========================
// LOAD DESCRIPTION
// ==========================

async function loadDescription(type) {

    const descBox =
        document.getElementById("set-description");

    const filePath =
        type === "general"
            ? "Bounties/General/desc.md"
            : "Bounties/Custom/desc.md";

    try {

        const response = await fetch(filePath);

        if (!response.ok) {
            throw new Error(
                `Could not load ${filePath}`
            );
        }

        const markdown =
            await response.text();

        descBox.innerHTML =
            marked.parse(markdown);

    } catch (error) {

        console.error(error);

        descBox.innerHTML =
            "<p>No description available.</p>";
    }
}

// ==========================
// SHOW BOUNTIES
// ==========================

function showBounties(type) {

    const gallery =
        document.getElementById("gallery");

    const bountyList =
        type === "general"
            ? generalBounties
            : customBounties;

    loadDescription(type);

    gallery.innerHTML =
        bountyList.map(bounty => `
            <div class="bounty-card">
                <img src="${bounty.image}"
                     alt="${bounty.title}">
                <div class="bounty-title">
                    ${bounty.title}
                </div>
            </div>
        `).join("");
}

// ==========================
// DEFAULT PAGE
// ==========================

showBounties("general");

</script>

</body>
</html>
```
